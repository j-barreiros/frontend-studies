<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main>
        <section id="card-login">
            <section id="banner">
                <div id="banner-overlay"></div>
            </section>
            <section id="login-section">
                <h1>Sing in</h1>

                
                <form id="login-form" action="">
                    <!-- Email -->
                    <label for="username-field">Username</label>
                    <input id="username-field" placeholder="Email" type="text">
                    <!-- Password -->
                    <label for="password-field">Password</label>
                    <input id="password-field" placeholder="Password" type="password">
                    
                    <a href="#">Forgot your password ?</a>
                    <button type="submit">Log in</button>
                </form>
                
                <hr>

                <div id="login-options">
                    <a href="#" class="login-with"><i class="fab fa-google"></i> Sing in with Google</a>
                    <a href="#" class="login-with"><i class="fab fa-twitter"></i> Sing in with Twitter</a>
                    <a href="#" class="login-with"><i class="fab fa-github"></i> Sing in with Github</a>
                </div>

                
            </section>
        </section>
    </main>
</body>
</html>
